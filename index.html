<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Clean Site with Snap Scroll</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: black;
      background: url('./bg.png') no-repeat center center fixed;
      background-size: cover;

      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }
    nav {
      width: 100%;
      padding: 20px 0;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
      background: rgba(255 255 255 / 0.5); /* semi-transparent for clarity */
    }
    nav a {
      text-decoration: none;
      color: black;
      margin: 0 15px;
      font-size: 18px;
      transition: opacity 0.2s ease;
    }
    nav a:hover {
      opacity: 0.7;
    }
    .hero {
      scroll-snap-align: start;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-no-snap {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1, .hero-no-snap h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .hero p, .hero-no-snap p {
      font-size: 20px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <div class="hero">
    <h1>Welcome to the <br> <strong>Minecraft Capes Community</strong></h1>
    <p><strong>The</strong> place to discuss anything about capes</p>
  </div>

  <div class="hero">
    <h1>Join the <br> <strong>Community Today</strong></h1>
    <p>Share your favorite capes and more</p>
  </div>

  <div class="hero">
    <h1>Contact Us <br> <strong>Get in Touch</strong></h1>
    <p>Questions? Reach out anytime!</p>
  </div>

  <div class="hero-no-snap">
    <h1>Normal Scroll<br> <strong>text</strong></h1>
    <p>text</p>
  </div>
  
  <footer></footer>

</body>
</html>
